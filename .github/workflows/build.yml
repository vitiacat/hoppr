name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: hoppr
            asset_name: hoppr-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: hoppr
            asset_name: hoppr-linux-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: hoppr
            asset_name: hoppr-linux-musl-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: hoppr
            asset_name: hoppr-linux-musl-arm64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: hoppr
            asset_name: hoppr-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: hoppr.exe
            asset_name: hoppr-windows-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: hoppr.exe
            asset_name: hoppr-windows-arm64.exe

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Install Rust toolchain
            uses: dtolnay/rust-toolchain@stable
            with:
              targets: ${{ matrix.target }}

          - name: Rust cache
            uses: swatinem/rust-cache@v2
            with:
              key: ${{ matrix.target }}

          - name: Install cross-compilation tools (Linux ARM64)
            if: matrix.target == 'aarch64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
            run: |
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu

          - name: Install musl-tools
            if: contains(matrix.target, 'musl')
            run: |
              sudo apt-get update
              sudo apt-get install -y musl-tools

          - name: Configure Linker
            shell: bash
            run: |
              if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ] && [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
                echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              elif [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
                echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV
              elif [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
                echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV
              fi

          - name: Build release binary
            run: cargo build --release --target ${{ matrix.target }}

          - name: Prepare binary
            shell: bash
            run: |
              cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}

          - name: Upload binaries to release
            uses: softprops/action-gh-release@v2
            with:
              files: ${{ matrix.asset_name }}
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}